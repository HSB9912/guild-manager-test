            <div class="flex gap-2">
              <input type="text" id="boardCommentInput" placeholder="댓글을 입력하세요..." class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[11px] font-bold outline-none focus:ring-2 focus:ring-pink-100" onkeydown="if(event.key==='Enter')window._boardAddComment(${post.id})">
              <button onclick="window._boardAddComment(${post.id})" class="px-4 py-2 bg-pink-500 text-white rounded-xl text-[10px] font-bold shadow hover:bg-pink-600 transition-all shrink-0">등록</button>
            </div>

  window._boardBack = () => {
    window._boardState.viewingPost = null;
    window._boardState.composing = false;
    window.renderBoard(document.getElementById('contentArea'));
  };

  // === 추천 ===
  window._boardToggleLike = async (postId) => {
    if (!CURRENT_USER) return window.showMsg('로그인이 필요합니다.', 'error');
    try {
      const {data: existing, error: selErr} = await supaDb.from('board_likes').select('id').eq('post_id', postId).eq('user_email', CURRENT_USER.email).maybeSingle();
      if (selErr) throw selErr;
      if (existing) {
        const {error: delErr} = await supaDb.from('board_likes').delete().eq('id', existing.id);
        if (delErr) throw delErr;
        const {error: upErr} = await supaDb.from('board_posts').update({like_count: Math.max(0, (parseInt(document.getElementById('boardLikeCount')?.textContent)||1) - 1)}).eq('id', postId);
        if (upErr) throw upErr;
      } else {
        const {error: insErr} = await supaDb.from('board_likes').insert({post_id: postId, user_email: CURRENT_USER.email});
        if (insErr) throw insErr;
        const {error: upErr2} = await supaDb.from('board_posts').update({like_count: (parseInt(document.getElementById('boardLikeCount')?.textContent)||0) + 1}).eq('id', postId);
        if (upErr2) throw upErr2;
      }
      window._boardViewPost(postId);
    } catch(e) { window.showMsg('추천 실패: ' + e.message, 'error'); console.error('Like error:', e); }
  };

  // === 댓글 ===
  window._boardAddComment = async (postId) => {
    const input = document.getElementById('boardCommentInput');
    const content = (input?.value || '').trim();
    if (!content) return;
    const nicknameInput = document.getElementById('boardCommentNickname')?.value?.trim();
    try {
      const authorName = CURRENT_USER ? (CURRENT_USER.name || CURRENT_USER.email.split('@')[0]) : (nicknameInput || window._getAnonName());
      const authorEmail = CURRENT_USER?.email || 'anonymous';
      await supaDb.from('board_comments').insert({post_id: postId, content, author_email: authorEmail, author_name: authorName});
      const {data: post} = await supaDb.from('board_posts').select('comment_count').eq('id', postId).single();
      await supaDb.from('board_posts').update({comment_count: (post?.comment_count || 0) + 1}).eq('id', postId);
      window._boardViewPost(postId);
    } catch(e) { window.showMsg('댓글 등록 실패: ' + e.message, 'error'); }
  };

  window._boardDeleteComment = async (commentId, postId) => {
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    try {
      await supaDb.from('board_comments').delete().eq('id', commentId);
      const {count} = await supaDb.from('board_comments').select('id', {count: 'exact', head: true}).eq('post_id', postId);
      await supaDb.from('board_posts').update({comment_count: count || 0}).eq('id', postId);
      window._boardViewPost(postId);
    } catch(e) { window.showMsg('삭제 실패', 'error'); }
  };

  // === 글 삭제 ===
  window._boardDeletePost = async (postId) => {
    if (!confirm('게시글을 삭제하시겠습니까?')) return;
    try {
      await supaDb.from('board_posts').delete().eq('id', postId);
      window.showMsg('삭제되었습니다.', 'success');
      window._boardBack();

  // === 글쓰기/수정 ===
  window._anonCounter = 0;
  window._getAnonName = () => { window._anonCounter++; return '익명' + window._anonCounter; };

  window._boardCompose = (editPost) => {
    const wrap = document.getElementById('boardContent');
    if (!wrap) return;
    const bs = window._boardState;
    const isEdit = !!editPost;
    const canNotice = isAdmin();
    const isGuest = !CURRENT_USER;

    wrap.innerHTML = `<div class="flex-1 overflow-y-auto p-4 lg:p-5">
      <button onclick="window._boardBack()" class="text-[10px] text-gray-400 hover:text-pink-500 font-bold mb-3 block"><i class="fas fa-arrow-left mr-1"></i>뒤로</button>
      <h3 class="text-sm font-bold text-gray-800 mb-4">${isEdit ? '글 수정' : '새 글 작성'}</h3>

      <div class="space-y-3">
        ${isGuest ? `<div class="space-y-1">
          <label class="text-[10px] font-bold text-gray-500">닉네임 <span class="text-gray-300">(비워두면 익명)</span></label>
          <input type="text" id="boardPostNickname" placeholder="닉네임 입력 (선택)" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-xs font-bold outline-none focus:ring-2 focus:ring-pink-100" maxlength="20">
        </div>` : ''}

        <div class="flex items-center gap-2">
          <select id="boardPostType" class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-[11px] font-bold outline-none">
            ${canNotice ? `<option value="notice" ${(isEdit ? editPost.board_type : bs.tab)==='notice'?'selected':''}>공지</option>` : ''}
            <option value="free" ${(isEdit ? editPost.board_type : bs.tab)==='free'?'selected':''}>자유</option>
            <option value="suggest" ${(isEdit ? editPost.board_type : bs.tab)==='suggest'?'selected':''}>건의사항</option>
          </select>
          ${canNotice ? `<label class="flex items-center gap-1.5 text-[10px] font-bold text-gray-500"><input type="checkbox" id="boardPostPin" ${isEdit && editPost.is_pinned ? 'checked' : ''}> 상단 고정</label>` : ''}
        </div>

        <input type="text" id="boardPostTitle" placeholder="제목을 입력하세요" value="${isEdit ? editPost.title.replace(/"/g,'&quot;') : ''}" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-xs font-bold outline-none focus:ring-2 focus:ring-pink-100">

        <textarea id="boardPostContent" placeholder="내용을 입력하세요..." rows="10" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-xs outline-none focus:ring-2 focus:ring-pink-100 resize-y leading-relaxed">${isEdit ? editPost.content : ''}</textarea>

        <div>
          <label class="text-[10px] font-bold text-gray-500 block mb-1"><i class="fas fa-image mr-1"></i>이미지 첨부 (최대 3장)</label>
          <input type="file" id="boardPostImages" accept="image/*" multiple class="text-[10px] text-gray-500 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-pink-50 file:text-pink-500 file:font-bold file:text-[10px] file:cursor-pointer">
          ${isEdit && editPost.images?.length > 0 ? `<div class="flex gap-2 mt-2">${editPost.images.map(u => `<img src="${u}" class="h-16 rounded-lg border border-gray-200">`).join('')}<span class="text-[9px] text-gray-400 self-center">기존 이미지 (새로 업로드 시 교체)</span></div>` : ''}
        </div>

        <div class="flex gap-2 pt-2">
          <button onclick="window._boardSubmitPost(${isEdit ? editPost.id : 'null'})" class="px-5 py-2.5 bg-pink-500 text-white rounded-xl text-xs font-bold shadow hover:bg-pink-600 transition-all"><i class="fas fa-paper-plane mr-1"></i>${isEdit ? '수정' : '등록'}</button>
          <button onclick="window._boardBack()" class="px-5 py-2.5 bg-gray-200 text-gray-600 rounded-xl text-xs font-bold hover:bg-gray-300 transition-all">취소</button>
        </div>
      </div>
    </div>`;
  };

  window._boardEditPost = async (postId) => {
    try {
      const {data} = await supaDb.from('board_posts').select('*').eq('id', postId).single();
      if (data) window._boardCompose(data);
    } catch(e) { window.showMsg('로딩 실패', 'error'); }
  };

  window._boardSubmitPost = async (editId) => {
    const title = (document.getElementById('boardPostTitle')?.value || '').trim();
    const content = (document.getElementById('boardPostContent')?.value || '').trim();
    const boardType = document.getElementById('boardPostType')?.value || 'free';
    const isPinned = document.getElementById('boardPostPin')?.checked || false;
    const fileInput = document.getElementById('boardPostImages');
    const nicknameInput = document.getElementById('boardPostNickname')?.value?.trim();

    if (!title) return window.showMsg('제목을 입력하세요.', 'error');
    if (!content) return window.showMsg('내용을 입력하세요.', 'error');
    if (boardType === 'notice' && !isAdmin()) return window.showMsg('공지는 관리자만 작성 가능합니다.', 'error');

    try {
      window.showMsg('저장 중...', 'info');

      let imageUrls = [];
      if (fileInput && fileInput.files.length > 0) {
        const files = Array.from(fileInput.files).slice(0, 3);
        for (const file of files) {
          const ext = file.name.split('.').pop();
          const path = Date.now() + '_' + Math.random().toString(36).substring(2,8) + '.' + ext;
          await window._r2Upload('board-images', path, file);
          imageUrls.push(BOARD_STORAGE_URL + path);
        }
      } else if (editId) {
        const {data: existing} = await supaDb.from('board_posts').select('images').eq('id', editId).single();
        imageUrls = existing?.images || [];
      }

      const authorName = CURRENT_USER ? (CURRENT_USER.name || CURRENT_USER.email.split('@')[0]) : (nicknameInput || window._getAnonName());
      const authorEmail = CURRENT_USER?.email || 'anonymous';
      const postData = {
        board_type: boardType,
        title, content,
        author_email: authorEmail,
        author_name: authorName,
        is_pinned: isPinned,
        images: imageUrls,
        updated_at: new Date().toISOString()
      };

      if (editId) {
        const {error} = await supaDb.from('board_posts').update(postData).eq('id', editId);
        if (error) throw error;
        window.showMsg('수정되었습니다.', 'success');
      } else {
        const {error} = await supaDb.from('board_posts').insert(postData);
        if (error) throw error;
        window.showMsg('등록되었습니다.', 'success');
      }

      window._boardState.tab = boardType;
      window._boardBack();
    } catch(e) { window.showMsg('저장 실패: ' + e.message, 'error'); }
  };

  // ============ 부캐 현황 ============
  window._subCharsState = { guild: '', search: '', sortField: 'role', sortOrder: 'asc' };

  window.renderSubChars = (container) => {
    const members = appState.members;
    const guilds = appState.guilds;
    const subGuilds = guilds.filter(g => !['뚠카롱','뚱카롱'].includes(g.name));
    const ss = window._subCharsState;
    if (!ss.guild) ss.guild = subGuilds[0]?.name || '';

    // 본캐 맵: 본캐이름 → { main, subs[] }
    const mainMap = {};
    members.filter(m => m.isMain).forEach(m => { mainMap[m.name] = { main: m, subs: [] }; });
    members.filter(m => !m.isMain && m.mainCharName).forEach(m => {
      if (mainMap[m.mainCharName]) mainMap[m.mainCharName].subs.push(m);
    });

    // 선택 길드 멤버 → 본캐별 그룹
    const selectedMembers = members.filter(m => m.guild === ss.guild);
    const guildSummary = {};
    subGuilds.forEach(g => { guildSummary[g.name] = members.filter(m => m.guild === g.name).length; });

    const treeData = [];
    const processedMains = new Set();
    selectedMembers.forEach(m => {
      const mainName = m.isMain ? m.name : (m.mainCharName || '');
      if (!mainName || processedMains.has(mainName)) return;
      processedMains.add(mainName);
      const mainInfo = mainMap[mainName];
      if (mainInfo) {
        const subsInGuild = mainInfo.subs.filter(s => s.guild === ss.guild);
        // 본캐 자신이 이 길드에 직접 가입한 경우 → 부캐1에 본캐도 포함
        const mainInThisGuild = mainInfo.main.guild === ss.guild;
        if (mainInThisGuild && !subsInGuild.some(s => s.name === mainInfo.main.name)) {
          subsInGuild.unshift(mainInfo.main);
        }
        treeData.push({ main: mainInfo.main, subs: subsInGuild });
      } else {
        treeData.push({ main: { name: mainName, guild: '?', role: '', class: '' }, subs: [m] });
      }
    });

    // 검색
    const search = (ss.search || '').toLowerCase().trim();
    const filtered = search ? treeData.filter(t =>
      t.main.name.toLowerCase().includes(search) ||
      t.subs.some(s => s.name.toLowerCase().includes(search))
    ) : treeData;

    // 정렬
    const rp = ROLE_PRIORITY || {};
    const sf = ss.sortField || 'role';
    const so = ss.sortOrder || 'asc';
    const dir = so === 'asc' ? 1 : -1;
    filtered.sort((a, b) => {
      if (sf === 'role') return ((rp[a.main.role]??99) - (rp[b.main.role]??99)) * dir || a.main.name.localeCompare(b.main.name);
      if (sf === 'name') return a.main.name.localeCompare(b.main.name) * dir;
      if (sf === 'subs') return (a.subs.length - b.subs.length) * dir;
      return 0;
    });
    const sortIcon = (f) => sf === f ? (so === 'asc' ? ' <i class="fas fa-sort-up"></i>' : ' <i class="fas fa-sort-down"></i>') : ' <i class="fas fa-sort text-gray-300"></i>';

    // 최대 부캐 수 (컬럼 수 결정)
    const maxSubs = Math.max(1, ...filtered.map(t => t.subs.length));
    const subCols = maxSubs;

    const gInfo = guilds.find(g => g.name === ss.guild) || {};

    container.innerHTML = `
    <div class="flex flex-col gap-3 fade-in pb-20 lg:pb-0">

  window._subCharsCopy = () => {
    const table = document.getElementById('subCharsTable');
    if (!table) return;

    let tsv = '';
    table.querySelectorAll('tr').forEach(tr => {
      const cells = [];
      tr.querySelectorAll('th, td').forEach(td => cells.push(td.innerText.trim()));
      tsv += cells.join('\t') + '\n';
    });

    let html = '<table border="1" cellpadding="4" style="border-collapse:collapse;font-size:11px;font-family:sans-serif">';
    table.querySelectorAll('tr').forEach(tr => {
      const rowBg = tr.style.background || tr.style.backgroundColor || '';
      const rowStyle = rowBg ? `background:${rowBg};` : '';
      html += `<tr style="${rowStyle}">`;
      tr.querySelectorAll('th, td').forEach(cell => {
        const tag = cell.tagName.toLowerCase();
        let cellBg = '', cellColor = '';
        // 1. 셀 안의 span style 확인
        const spans = cell.querySelectorAll('span[style]');
        spans.forEach(span => {
          const s = span.style;
          if (s.backgroundColor || s.background) {
            cellBg = s.backgroundColor || s.background;
            cellColor = s.color || 'white';
          }
        });
        // 2. 셀 자체 style
        if (!cellBg && cell.style.backgroundColor) { cellBg = cell.style.backgroundColor; cellColor = cell.style.color || ''; }
        // 3. 행 배경 상속
        if (!cellBg && rowBg) { cellBg = rowBg; }

        const style = `border:1px solid #ccc;padding:2px 5px;font-weight:bold;${cellBg ? 'background:'+cellBg+';' : ''}${cellColor ? 'color:'+cellColor+';' : ''}`;

      });
      html += '</tr>';

      const blob = new Blob([html], { type: 'text/html' });

        ${guildList.map(g => `<button onclick="window._weeklyLogState.guild='${g}';window.renderWeeklyLog(document.getElementById('contentArea'))" class="px-2 py-0.5 rounded text-[8px] font-bold ${ws.guild===g ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-500'}">${g.replace('카롱','')}</button>`).join('')}

        ${filtered.length === 0 ? `<div class="p-8 text-center text-gray-300 text-xs font-bold"><i class="fas fa-inbox text-2xl mb-2 block"></i>이력 없음</div>` : `

    window._weeklyTrack = async (name, hid) => {

    const g1 = window._getLatestWeekScores('뚠카롱').sort((a,b) => b.score - a.score);
    if (g1.length === 0) return 0;
    const idx = Math.min(179, g1.length - 1);
    return g1[idx].score;
  };

  window.renderPromotion = async (container) => {
    const st = window._promoSubTab;
    let applicants = [];
    try {
      const {data} = await supaDb.from('promotion_applicants').select('*').eq('status','waiting').order('applied_at');
      applicants = data || [];
    } catch(e) {}

    const headers = appState.suroHeaders || [];
    const selectedH = window._getPromoHeader();
    const cutline = window._get180Cutline();
    const bottom10 = window._getBottom10();
    const g1Total = window._getLatestWeekScores('뚠카롱').length;

    const challengers = applicants.map(a => {
      const m = appState.members.find(x => x.name === a.name);
      return { ...a, score: m ? (Math.round(Number(m.suro?.[selectedH])) || 0) : 0, member: m };
    }).sort((a,b) => b.score - a.score);

    // 매칭: 승격 조건 충족하는 도전자만 매칭 대상
    const qualifiedChallengers = challengers.filter(ch => {
      if (ch.score <= 0) return false;
      if (ch.score > cutline) return true;
      // 방어자 중 0점이 있으면 매칭 가능
      const worstDefender = bottom10.length > 0 ? bottom10[bottom10.length - 1] : null;
      if (worstDefender && worstDefender.score === 0) return true;
      // 5000점 격차 가능성 체크
      if (bottom10.some(df => ch.score >= df.score + 5000)) return true;
      return false;
    });

    const matchLen = Math.min(qualifiedChallengers.length, bottom10.length);
    const matches = [];
    const usedDefenders = new Set();
    for (let i = 0; i < matchLen; i++) {
      const ch = qualifiedChallengers[i];

          </select>

      </div>

      <div class="flex gap-1.5 overflow-x-auto no-scrollbar">
        ${['ranking','admin_match','history'].map(t => {

        }).join('')}

      ${st === 'ranking' ? `
      ${isAdmin() ? `<div class="flex gap-2 relative">

        <div id="promoAutocompleteList" class="hidden absolute top-full left-0 right-16 mt-1 bg-white border border-gray-200 rounded-xl shadow-lg z-50 max-h-48 overflow-y-auto"></div>
        <button onclick="window._promoAddByAdmin()" class="px-4 py-2.5 bg-green-500 text-white rounded-xl text-[10px] sm:text-xs font-bold shadow hover:bg-green-600 shrink-0 transition-all active:scale-95"><i class="fas fa-plus mr-1"></i>추가</button>

      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">

          ${isAdmin() ? `<button onclick="window._promoSaveCutline(${cutline})" class="ml-auto text-[9px] text-indigo-500 font-bold hover:text-indigo-700"><i class="fas fa-save mr-0.5"></i>컷라인 저장</button>` : ''}

        ${challengers.length === 0 ? '<div class="p-6 text-center text-gray-300 text-xs font-bold">승급 신청자가 없습니다</div>' : `
        <div class="overflow-auto">

          <thead class="bg-gray-50 text-[8px] font-bold text-gray-400 uppercase">
            <tr><th class="py-1.5 px-1.5 text-center w-7">#</th><th class="py-1.5 px-1.5 text-left">닉네임</th><th class="py-1.5 px-1.5 text-left hidden sm:table-cell">직업</th><th class="py-1.5 px-1.5 text-right">점수</th><th class="py-1.5 px-1.5 text-right hidden sm:table-cell">컷 대비</th><th class="py-1.5 px-1.5 text-center">상태</th>${isAdmin()?'<th class="py-1.5 px-1.5 w-14 text-center">관리</th>':''}</tr>

              let badge = '', bc = '';

                <td class="py-1.5 px-1.5 text-center"><span class="text-[8px] font-bold px-1 py-0.5 rounded-full ${bc}">${badge}</span></td>
                ${isAdmin()?`<td class="py-1.5 px-1 text-center whitespace-nowrap"><button onclick="window._promoEdit(${ch.id},'${ch.name.replace(/'/g,"\\'")}')" class="text-indigo-400 hover:text-indigo-600 mr-0.5 p-1" title="수정"><i class="fas fa-pen text-[9px]"></i></button><button onclick="window._promoRemove(${ch.id})" class="text-red-400 hover:text-red-600 p-1" title="삭제"><i class="fas fa-times text-[9px]"></i></button></td>`:''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        </div>`}
      </div>

      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-3">
        <h3 class="text-[10px] font-bold text-gray-800 mb-2"><i class="fas fa-shield-alt mr-1 text-red-400"></i>1기 강등 방어자 (하위 10명)</h3>
        <div class="grid grid-cols-2 sm:grid-cols-5 lg:grid-cols-10 gap-1.5">
          ${bottom10.map((d, i) => `<div class="bg-red-50 rounded-xl p-2 text-center border border-red-100 hover:border-red-200 transition-all">
            <div class="text-[8px] text-red-400 font-bold">${g1Total - 9 + i}등</div>
            <div class="text-[10px] sm:text-[9px] font-bold text-gray-800 truncate" title="${d.name}">${d.name}</div>
            <div class="text-[10px] sm:text-[9px] text-red-500 font-black">${d.score.toLocaleString()}</div>

      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-3">

          <h3 class="text-xs font-bold text-gray-800"><i class="fas fa-exchange-alt mr-2 text-indigo-500"></i>승격 매칭 (${matches.length}건)</h3>

        <p class="text-[9px] text-gray-400 mb-2">↓ 게임에서 아래 순서대로 길드 이동하세요</p>

          ${matches.map((m, i) => `<div class="flex items-center gap-2 p-3 rounded-xl text-[10px] sm:text-xs bg-green-50 border border-green-200">
            <span class="text-[9px] font-black text-gray-400 shrink-0">${i+1}</span>
            <div class="flex-1 min-w-0"><div class="text-[8px] text-purple-500 font-bold">2기 → 1기</div><div class="font-black text-gray-800 truncate">${m.challenger.name}</div><div class="text-indigo-600 font-bold">${m.challenger.score.toLocaleString()}점</div></div>
            <span class="text-lg shrink-0">⇄</span>
            <div class="flex-1 min-w-0 text-right"><div class="text-[8px] text-red-500 font-bold">1기 → 2기</div><div class="font-black text-gray-800 truncate">${m.defender.name}</div><div class="text-red-500 font-bold">${m.defender.score.toLocaleString()}점</div></div>
          </div>`).join('')}
        </div>`}
      </div>
      ${waitingList.length > 0 ? `
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-3">
        <h3 class="text-[10px] font-bold text-gray-500 mb-2"><i class="fas fa-clock mr-1 text-gray-400"></i>조건 미달 대기자 (${waitingList.length}명)</h3>
        <div class="flex flex-wrap gap-1.5">
          ${waitingList.map(ch => `<span class="text-[9px] font-bold px-2 py-1 rounded-lg bg-gray-100 text-gray-500">${ch.name} <span class="text-gray-400">${ch.score.toLocaleString()}점</span></span>`).join('')}
        </div>
        <p class="text-[8px] text-gray-400 mt-2">※ 조건 미달 시 대기 유지 · 다음 주차에 재평가됩니다</p>
      </div>` : ''}
      ` : ''}

      ${st === 'history' ? `
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="p-2.5 border-b border-gray-100 flex items-center justify-between">
          <h3 class="text-xs font-bold text-gray-800"><i class="fas fa-history mr-1 text-indigo-400"></i>승강 이력</h3>
          ${isAdmin() ? `<button onclick="window._promoAddHistory()" class="text-[9px] font-bold text-indigo-500 hover:text-indigo-700 px-2 py-1 rounded-lg hover:bg-indigo-50 transition-all"><i class="fas fa-plus mr-1"></i>수동 추가</button>` : ''}
        </div>
        <div id="promoHistoryList" class="p-2 text-center text-gray-400 text-xs">로딩 중...</div>
      </div>
      ` : ''}
    </div>`;

    if (st === 'history') window._promoLoadHistory();
    if (!window._promoClickHandlerSet) {
      window._promoClickHandlerSet = true;
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#promoAddName') && !e.target.closest('#promoAutocompleteList')) {
          document.getElementById('promoAutocompleteList')?.classList.add('hidden');
        }
      });
    }
  };

  window._promoAutocomplete = (val) => {
    const list = document.getElementById('promoAutocompleteList');
    if (!list) return;
    const q = val.trim().toLowerCase();
    if (!q) { list.classList.add('hidden'); return; }
    const g2 = appState.members.filter(m => m.guild === '뚱카롱' && m.isMain && m.name.toLowerCase().includes(q)).slice(0, 8);
    if (g2.length === 0) { list.classList.add('hidden'); return; }
    list.innerHTML = g2.map(m => `<button onclick="document.getElementById('promoAddName').value='${m.name}';document.getElementById('promoAutocompleteList').classList.add('hidden')" class="w-full text-left px-3 py-2 text-xs font-bold text-gray-700 hover:bg-indigo-50 transition-all flex items-center gap-2"><span>${m.name}</span><span class="text-[9px] text-gray-400">${m.class||''}</span></button>`).join('');
    list.classList.remove('hidden');
  };

  window._promoAddByAdmin = async () => {
    const name = document.getElementById('promoAddName')?.value?.trim();
    if (!name) return window.showMsg('닉네임을 입력하세요', 'error');
    const member = appState.members.find(m => m.name === name);
    if (!member) return window.showMsg('존재하지 않는 멤버: ' + name, 'error');
    if (member.guild !== '뚱카롱') return window.showMsg(name + '은(는) 뚱카롱 소속이 아닙니다', 'error');
    try {
      const {error} = await supaDb.from('promotion_applicants').upsert({member_id: member.id, name: name, status: 'waiting', promoted_at: null}, {onConflict: 'member_id'});
      if (error) throw error;
      document.getElementById('promoAddName').value = '';
      window.showMsg(name + ' 승급 신청 추가!', 'success');
      window.renderPromotion(document.getElementById('contentArea'));
    } catch(e) { window.showMsg('추가 실패: ' + e.message, 'error'); }
  };

  window._promoRemove = async (id) => {
    if (!confirm('이 신청을 제거하시겠습니까?')) return;
    try {
      const {error} = await supaDb.from('promotion_applicants').delete().eq('id', id);
      if (error) throw error;
      window.showMsg('신청 삭제 완료', 'success');
      window.renderPromotion(document.getElementById('contentArea'));
    } catch(e) { window.showMsg('삭제 실패: ' + e.message, 'error'); }
  };

  window._promoSaveCutline = async (score) => {
    const weekLabel = window.getSuroPeriodHeader();
    try {
      await supaDb.from('promotion_cutlines').upsert({week_label: weekLabel, rank_180_score: score});
      window.showMsg('컷라인 저장: ' + score.toLocaleString() + '점', 'success');
    } catch(e) { window.showMsg('저장 실패', 'error'); }
  };

  window._promoExecuteTrade = async () => {
    if (!confirm('승격 조건을 충족한 매칭만 실행됩니다.\n진행하시겠습니까?')) return;
    const btn = document.getElementById('promoExecBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>처리 중...'; }
    const selectedH = window._getPromoHeader();
    const cutline = window._get180Cutline();
    const bottom10 = window._getBottom10();
    let applicants = [];
    try { const {data} = await supaDb.from('promotion_applicants').select('*').eq('status','waiting'); applicants = data || []; } catch(e) {}
    const challengers = applicants.map(a => {
      const m = appState.members.find(x => x.name === a.name);
      return { ...a, score: m ? (Math.round(Number(m.suro?.[selectedH])) || 0) : 0, member: m };
    }).sort((a,b) => b.score - a.score);

    // 프리뷰와 동일한 매칭 로직 (승격 조건 충족만)
    const usedDf = new Set();
    const weekLabel = selectedH;
    let ok = 0;
    for (const ch of challengers) {
      if (ch.score <= 0) continue;
      let bestDf = null, bestReason = '';
      // 0점 방어자 우선
      for (const df of bottom10) {
        if (usedDf.has(df.name)) continue;
        if (df.score === 0) { bestDf = df; bestReason = '방어자 0점'; break; }
      }
      // 5000점 격차
      if (!bestDf) {
        for (const df of [...bottom10].reverse()) {
          if (usedDf.has(df.name)) continue;
          if (ch.score >= df.score + 5000) { bestDf = df; bestReason = '5,000점 격차'; break; }
        }
      }
      // 컷라인 돌파
      if (!bestDf && ch.score > cutline) {
        for (const df of [...bottom10].reverse()) {
          if (usedDf.has(df.name)) continue;
          bestDf = df; bestReason = '180등 컷 돌파'; break;
        }
      }
      if (!bestDf) continue; // 조건 미달 → 건너뜀 (이력 안 남김)

      usedDf.add(bestDf.name);
      // 승격 이력만 기록
      await supaDb.from('promotion_history').insert({ week_label: weekLabel, challenger_name: ch.name, challenger_score: ch.score, defender_name: bestDf.name, defender_score: bestDf.score, result: 'promoted', reason: bestReason });
      if (ch.member) await supaDb.from('members').update({guild:'뚠카롱'}).eq('id', ch.member.id);
      const dfM = appState.members.find(m => m.name === bestDf.name);
      if (dfM) await supaDb.from('members').update({guild:'뚱카롱'}).eq('id', dfM.id);
      await supaDb.from('promotion_applicants').update({status:'promoted', promoted_at: new Date().toISOString()}).eq('id', ch.id);
      await supaDb.from('operation_history').insert([
        {date: window.getKSTDateStr(), category:'승강-승격', name: ch.name, content: `뚱카롱→뚠카롱 (${ch.score.toLocaleString()}점, ${bestReason}, 기준: ${weekLabel})`},
        {date: window.getKSTDateStr(), category:'승강-강등', name: bestDf.name, content: `뚠카롱→뚱카롱 (${bestDf.score.toLocaleString()}점)`},
      ]);
      ok++;
    }
    await window.fetchMembers();
    window.showMsg(ok > 0 ? `승강 완료! ${ok}건 교체` : '승격 조건을 충족하는 매칭이 없습니다.', ok > 0 ? 'success' : 'info');
    window.renderPromotion(document.getElementById('contentArea'));
  };

  window._promoLoadHistory = async () => {
    const el = document.getElementById('promoHistoryList');
    if (!el) return;
    try {
      const {data} = await supaDb.from('promotion_history').select('*').order('executed_at', {ascending: false}).limit(50);
      if (!data || data.length === 0) { el.innerHTML = '<p class="text-xs text-gray-300 py-4">이력 없음</p>'; return; }
      const grouped = {};
      data.forEach(h => { if (!grouped[h.week_label]) grouped[h.week_label] = []; grouped[h.week_label].push(h); });
      el.innerHTML = Object.entries(grouped).map(([week, items]) => `
        <div class="mb-3"><div class="text-[9px] font-bold text-indigo-500 px-2 py-1 bg-indigo-50 rounded-lg mb-1 flex items-center justify-between"><span>${week}</span><span class="text-gray-400">${items.length}건</span></div>
          ${items.map(h => `<div class="flex items-center gap-2 px-2 py-1.5 text-[10px] border-b border-gray-50 hover:bg-gray-50/50 group">
            <span class="${h.result==='promoted'?'text-green-500':'text-red-400'} font-bold shrink-0">${h.result==='promoted'?'✅':'❌'}</span>
            <span class="text-purple-600 font-bold truncate">${h.challenger_name}</span><span class="text-gray-400 shrink-0">${h.challenger_score.toLocaleString()}</span>
            <span class="text-gray-300 shrink-0">↔</span>

  window._drawRouletteWheel = (angle) => {
    const canvas = document.getElementById('rouletteCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const items = window._getRouletteItems();
    const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 6;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 외곽 링
    ctx.beginPath(); ctx.arc(cx, cy, r + 5, 0, 2 * Math.PI);
    ctx.fillStyle = '#ede9fe'; ctx.fill();

    let startAngle = angle - Math.PI / 2;
    items.forEach(item => {
      const sa = (item.prob / 100) * 2 * Math.PI;
      const ea = startAngle + sa;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, startAngle, ea); ctx.closePath();
      ctx.fillStyle = item.color; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2; ctx.stroke();

      // 텍스트 (너무 좁은 섹터는 스킵)
      if (sa >= 0.18) {
        const ta = startAngle + sa / 2;
        const tr = r * 0.60;
        ctx.save();
        ctx.translate(cx + Math.cos(ta) * tr, cy + Math.sin(ta) * tr);
        // 왼쪽 반구(cos<0)는 180도 뒤집어서 항상 읽기 쉽게
        let rot = ta + Math.PI / 2;
        if (Math.cos(ta) < 0) rot += Math.PI;
        ctx.rotate(rot);
        ctx.fillStyle = 'white'; ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 3;
        const fs = sa > 0.5 ? 10 : sa > 0.3 ? 9 : 8;
        ctx.font = `bold ${fs}px sans-serif`;
        const maxLen = sa > 0.5 ? 8 : 6;
        const label = item.name.length > maxLen ? item.name.slice(0, maxLen) : item.name;
        ctx.fillText(label, 0, sa > 0.25 ? -3 : 0);
        if (sa > 0.25) {
          ctx.font = 'bold 7px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.fillText(item.prob + '%', 0, 9);
        }
        ctx.restore();
      }
      startAngle = ea;
    });

    // 중심 원
    const grad = ctx.createRadialGradient(cx - 4, cy - 4, 2, cx, cy, 16);
    grad.addColorStop(0, '#8b5cf6'); grad.addColorStop(1, '#4c1d95');
    ctx.beginPath(); ctx.arc(cx, cy, 15, 0, 2 * Math.PI);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
  };

  window._buddySpinRoulette = async (teamId, isConfirm) => {
    if (window._rouletteSpinning) return;
    if (isConfirm && !confirm('⚠ 보상을 확정하시겠습니까? 한 번 확정하면 변경할 수 없습니다!')) return;

    const items = window._getRouletteItems();
    const rand = Math.random() * 100;
    let cumulative = 0, result = items[0];
    for (const item of items) { cumulative += item.prob; if (rand < cumulative) { result = item; break; } }

    // 결과 섹터 중심 각도 계산
    let resultStartProb = 0;
    for (const item of items) { if (item === result) break; resultStartProb += item.prob; }
    const resultCenterOffset = ((resultStartProb + result.prob / 2) / 100) * 2 * Math.PI;

    // 속도별 회전수/시간 설정
    const speedMap = { vfast: {r: 25, d: 2200}, fast: {r: 18, d: 3500}, normal: {r: 13, d: 5000}, slow: {r: 8, d: 7000} };
    const spd = speedMap[window._rouletteSpeed] || speedMap.fast;

    // 목표 각도: N바퀴 + 결과 섹터가 포인터에 오는 위치
    const startAngle = window._rouletteCurrentAngle;
    const restAngle = -resultCenterOffset;
    const startNorm = ((startAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const restNorm = ((restAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    let extra = restNorm - startNorm;
    if (extra <= 0) extra += 2 * Math.PI;
    const targetAngle = startAngle + 2 * Math.PI * spd.r + extra;

    const itemEl = document.getElementById('rouletteItemText');
    const valueEl = document.getElementById('rouletteValueText');
    if (itemEl) { itemEl.textContent = '🎰 돌리는 중...'; itemEl.style.color = '#9ca3af'; itemEl.className = 'text-xl font-black text-gray-300'; }
    if (valueEl) valueEl.textContent = '';

    window._rouletteSpinning = true;
    if (window._rouletteRAF) cancelAnimationFrame(window._rouletteRAF);

    const startTime = performance.now();
    const animate = (now) => {
      const t = Math.min((now - startTime) / spd.d, 1);
      const eased = 1 - Math.pow(1 - t, 4); // quartic ease-out
      const cur = startAngle + (targetAngle - startAngle) * eased;
      window._rouletteCurrentAngle = cur;
      window._drawRouletteWheel(cur);

      if (t < 1) {
        window._rouletteRAF = requestAnimationFrame(animate);
      } else {
        window._rouletteSpinning = false;
        window._rouletteCurrentAngle = targetAngle;
        if (itemEl) { itemEl.textContent = '🎉 ' + result.name + ' 🎉'; itemEl.style.color = result.color; itemEl.className = 'text-xl font-black animate-pulse'; }
        if (valueEl) valueEl.textContent = result.value + (isConfirm ? ' — 확정!' : ' — 연습');

        if (isConfirm) {
          supaDb.from('buddy_roulette').insert({team_id: teamId, result_item: result.name, result_value: result.value}).then(({error}) => {
            if (error) { window.showMsg('저장 실패: ' + error.message, 'error'); return; }
            supaDb.from('buddy_teams').update({status: 'completed'}).eq('id', teamId);
            const btn = document.getElementById('rouletteConfirmBtn');
            if (btn) { btn.disabled = true; btn.textContent = '✅ 확정 완료'; btn.className = 'px-6 py-3 bg-green-500 text-white rounded-2xl font-bold text-sm cursor-default'; }
            window.showMsg('🎉 ' + result.name + ' (' + result.value + ') 확정!', 'success');
            setTimeout(() => window._buddyDetail(teamId), 2000);
          });
        }
      }
    };
    requestAnimationFrame(animate);
  };

  window._recSaveForm = async (editId) => {
   const form = document.getElementById('recForm');
   if (!form) return;
   const fd = new FormData(form);
   const rec = {};
   for (const [k, v] of fd.entries()) rec[k] = v.trim();
   if (!rec.nickname) return window.showMsg('닉네임을 입력해주세요', 'error');
   if (!rec.join_date) return window.showMsg('가입일자를 입력해주세요', 'error');
   if (rec.leave_date === '') delete rec.leave_date;

   try {
   if (editId) {
   const { error } = await supaDb.from('member_records').update(rec).eq('id', editId);
   if (error) throw error;
   const idx = window._recordsState.data.findIndex(r => r.id === editId);
   if (idx >= 0) window._recordsState.data[idx] = { ...window._recordsState.data[idx], ...rec };
   window.showMsg('수정 완료!', 'success');
   } else {
   const { data, error } = await supaDb.from('member_records').insert(rec).select();
   if (error) throw error;
   if (data?.[0]) window._recordsState.data.unshift(data[0]);
   window.showMsg('등록 완료!', 'success');
   }
   window._recToggleView('table');
   } catch(e) {
   window.showMsg('저장 실패: ' + e.message, 'error');
   }
  };

  window._recEdit = (id) => {
   const rec = window._recordsState.data.find(r => r.id === id);

   window.renderRecords(document.getElementById('contentArea'));
   setTimeout(() => window._recRenderAddForm(rec), 50);
  };

   try {
   const { error } = await supaDb.from('member_records').delete().eq('id', id);
   if (error) throw error;
   window._recordsState.data = window._recordsState.data.filter(r => r.id !== id);
   window._recRenderTable();
   window.showMsg('삭제 완료', 'success');
   } catch(e) { window.showMsg('삭제 실패: ' + e.message, 'error'); }
  };

  window._recSyncStatus = async () => {
   const st = window._recordsState;
   if (st.data.length === 0) return window.showMsg('기록 데이터가 없습니다', 'error');
   const apiKey = window._getNexonApiKey();
   if (!apiKey) return window.showMsg('설정에서 Nexon API Key를 먼저 입력해주세요', 'error');

   let currentMembers = [], mFrom = 0;
   while (true) {
   const { data: batch } = await supaDb.from('members').select('name, guild').range(mFrom, mFrom + 999);
   currentMembers = currentMembers.concat(batch || []);
   if (!batch || batch.length < 1000) break;
   mFrom += 1000;
   }
   const currentNames = new Set(currentMembers.map(m => m.name));

   const activeRecords = st.data.filter(r => r.status === 'active');
   const sevenDaysAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];
   const missingRecords = activeRecords.filter(r => {
   if (currentNames.has(r.nickname)) return false;
   if (r.last_verified && r.last_verified >= sevenDaysAgo) return false;
   return true;
   });

   if (missingRecords.length === 0) {
   window.showMsg('모든 재직자가 현재 길드원 목록에 있습니다! ✅', 'success');
   return;
   }

   const existing = document.getElementById('recSyncModal');
   if (existing) existing.remove();

   const modal = document.createElement('div');
   modal.id = 'recSyncModal';
   modal.className = 'fixed inset-0 bg-black/50 z-[9999] flex items-center justify-center p-4';
   modal.innerHTML = `
   <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col overflow-hidden">

   <button onclick="document.getElementById('recSyncModal').remove()" class="w-8 h-8 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-400"><i class="fas fa-times"></i></button>

   <div class="p-4 shrink-0">

   <div id="recApiProgress" class="text-[11px] text-gray-400 font-bold"></div>

   <button onclick="document.getElementById('recSyncModal').remove()" class="px-4 py-2.5 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded-xl text-xs font-bold ml-auto">닫기</button>
   </div>

   document.body.appendChild(modal);
   modal.onclick = (e) => { if (e.target === modal) modal.remove(); };

   window._syncMissingRecords = missingRecords;
  };

  window._recApiCheck = async () => {
   const records = window._syncMissingRecords;
   if (!records) return;
   const btn = document.getElementById('recApiCheckBtn');
   const prog = document.getElementById('recApiProgress');
   if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>조회 중...'; }

   const ourGuilds = new Set(['뚠카롱', '뚱카롱', '밤카롱', '별카롱', '달카롱', '꿀카롱']);
   const rows = document.querySelectorAll('.sync-row');
   let done = 0;

   for (let i = 0; i < records.length; i++) {
   const r = records[i];
   const row = rows[i];
   if (!row) continue;
   const statusCell = row.querySelector('.sync-status');
   const apiCell = row.querySelector('.sync-api-result');
   const actionCell = row.querySelector('.sync-action-cell');

   if (prog) prog.textContent = `${done + 1}/${records.length} 조회 중... (${r.nickname})`;

   try {
   const info = await window._getCharInfo(r.nickname);
   await new Promise(ok => setTimeout(ok, 120));

   if (!info) {
   statusCell.innerHTML = '<span class="px-2 py-0.5 bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 rounded-lg text-[9px] font-bold">🔄 닉변 의심</span>';
   apiCell.innerHTML = '<span class="text-amber-500">캐릭터 미존재 (닉변 가능성)</span>';
   actionCell.innerHTML = `
   <div class="flex items-center gap-1">
   <select class="sync-action px-2 py-1 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 rounded-lg text-[10px] font-bold outline-none" onchange="this.closest('tr').querySelector('.nick-input').style.display=this.value==='rename'?'block':'none'">
   <option value="rename" selected>✏️ 닉변</option>
   <option value="leave">🔴 탈퇴</option>
   <option value="skip">⏭ 유지</option>
   </select>
   <input type="text" class="nick-input px-2 py-1 bg-white dark:bg-gray-700 border border-amber-300 dark:border-amber-700 rounded-lg text-[10px] font-bold outline-none w-24 focus:ring-1 focus:ring-amber-400" placeholder="새 닉네임">
   </div>`;
   } else if (ourGuilds.has(info.guild)) {
   statusCell.innerHTML = '<span class="px-2 py-0.5 bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 rounded-lg text-[9px] font-bold">✅ 재직 확인</span>';
   apiCell.innerHTML = `<span class="text-emerald-600">${info.guild} (Lv.${info.level} ${info.class})</span>`;
   actionCell.innerHTML = `<select class="sync-action px-2 py-1 bg-gray-50 dark:bg-gray-700 border rounded-lg text-[10px] font-bold outline-none"><option value="skip" selected>⏭ 유지</option><option value="leave">🔴 탈퇴</option></select><input type="text" class="nick-input hidden">`;
   const todayStr = new Date().toISOString().split('T')[0];
   supaDb.from('member_records').update({ last_verified: todayStr }).eq('id', r.id);
   const localRec = window._recordsState.data.find(x => x.id === r.id);
   if (localRec) localRec.last_verified = todayStr;
   } else if (info.guild) {
   statusCell.innerHTML = '<span class="px-2 py-0.5 bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 rounded-lg text-[9px] font-bold">🔴 탈퇴 확정</span>';
   apiCell.innerHTML = `<span class="text-red-500">→ <b>${info.guild}</b> 이동 (Lv.${info.level} ${info.class})</span>`;
   actionCell.innerHTML = `<select class="sync-action px-2 py-1 bg-red-50 dark:bg-red-900/20 border border-red-200 rounded-lg text-[10px] font-bold outline-none"><option value="leave" selected>🔴 탈퇴</option><option value="skip">⏭ 유지</option></select><input type="text" class="nick-input hidden">`;
   } else {
   statusCell.innerHTML = '<span class="px-2 py-0.5 bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400 rounded-lg text-[9px] font-bold">🟠 탈퇴 의심</span>';
   apiCell.innerHTML = `<span class="text-orange-500">길드 없음 (Lv.${info.level} ${info.class})</span>`;
   actionCell.innerHTML = `<select class="sync-action px-2 py-1 bg-orange-50 dark:bg-orange-900/20 border border-orange-200 rounded-lg text-[10px] font-bold outline-none"><option value="leave" selected>🔴 탈퇴</option><option value="skip">⏭ 유지</option></select><input type="text" class="nick-input hidden">`;
   }
   } catch(e) {
   statusCell.innerHTML = '<span class="px-2 py-0.5 bg-gray-100 text-gray-500 rounded-lg text-[9px] font-bold">❓ 오류</span>';
   apiCell.innerHTML = `<span class="text-gray-400">${e.message}</span>`;
   actionCell.innerHTML = `
   <div class="flex items-center gap-1">
   <select class="sync-action px-2 py-1 bg-gray-50 dark:bg-gray-700 border rounded-lg text-[10px] font-bold outline-none">
   <option value="skip" selected>⏭ 유지</option>
   <option value="rename">✏️ 닉변</option>
   <option value="leave">🔴 탈퇴</option>

   if (prog) prog.textContent = `✅ ${done}명 조회 완료`;

   document.getElementById('syncApplyBtn')?.classList.remove('hidden');

   document.querySelectorAll('.sync-action').forEach(sel => {
   sel.onchange = function() {
   const input = this.closest('tr').querySelector('.nick-input');
   if (input) input.style.display = this.value === 'rename' ? 'block' : 'none';
   };
   });
  };

  window._recApplySync = async () => {
   const rows = document.querySelectorAll('.sync-row');
   const btn = document.getElementById('syncApplyBtn');
   if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>처리 중...'; }

   let leaveCount = 0, renameCount = 0, skipCount = 0;
   const today = new Date().toISOString().split('T')[0];

   try {
   for (const row of rows) {
   const id = parseInt(row.dataset.id);
   const oldName = row.dataset.name;
   const actionSel = row.querySelector('.sync-action');
   if (!actionSel) { skipCount++; continue; }
   const action = actionSel.value;

   if (action === 'skip') { 
   await supaDb.from('member_records').update({ last_verified: today }).eq('id', id);
   const rec = window._recordsState.data.find(r => r.id === id);
   if (rec) rec.last_verified = today;
   skipCount++; continue; 
   }

   if (action === 'leave') {
   const apiText = row.querySelector('.sync-api-result')?.textContent || '';
   const guildMatch = apiText.match(/→\s*(.+?)\s*이동/);
   const leaveReason = guildMatch ? `${guildMatch[1]}(으)로 이동` : '';

   const { error } = await supaDb.from('member_records').update({ 
   status: 'left', leave_date: today,
   ...(leaveReason && !window._recordsState.data.find(r => r.id === id)?.leave_reason ? { leave_reason: leaveReason } : {})
   }).eq('id', id);
   if (error) throw error;
   const rec = window._recordsState.data.find(r => r.id === id);
   if (rec) { rec.status = 'left'; rec.leave_date = today; if (leaveReason && !rec.leave_reason) rec.leave_reason = leaveReason; }
   leaveCount++;
   }

   if (action === 'rename') {
   const newName = row.querySelector('.nick-input')?.value?.trim();
   if (!newName) { window.showMsg(`${oldName}: 새 닉네임을 입력해주세요`, 'error'); continue; }

  window._recParseText = (text, filename) => {
   if (!text?.trim()) return window.showMsg('데이터가 비어있습니다', 'error');

   const firstLine = text.split('\n')[0];
   const tabCount = (firstLine.match(/\t/g) || []).length;
   const commaCount = (firstLine.match(/,/g) || []).length;
   const delimiter = tabCount >= commaCount ? '\t' : ',';

  window._parseCSV = (text, delimiter) => {
   const rows = [];
   let row = [];
   let cell = '';
   let inQuotes = false;

   for (let i = 0; i < text.length; i++) {
   const c = text[i];
   const next = text[i + 1];

   if (inQuotes) {
   if (c === '"' && next === '"') {
   cell += '"';
   i++;
   } else if (c === '"') {
   inQuotes = false;
   } else {
   cell += c;
   }
   } else {
   if (c === '"') {
   inQuotes = true;
   } else if (c === delimiter) {
   row.push(cell);
   cell = '';
   } else if (c === '\n' || (c === '\r' && next === '\n')) {
   row.push(cell);
   cell = '';
   if (row.some(c => c.trim())) rows.push(row);
   row = [];
   if (c === '\r') i++;
   } else {
   cell += c;
   }
   }
   }
   if (cell || row.length > 0) {
   row.push(cell);
   if (row.some(c => c.trim())) rows.push(row);
   }
   return rows;
  };

      window._cfgApplyLogo();

      window.showMsg('로고가 업로드되었습니다!', 'success');

    if (!sibling || !sibling.classList.contains('cfg-role-item')) return;
    if (dir === -1) list.insertBefore(item, sibling);

   async function fetchAll(table, orderCol) {
   const pageSize = 1000;
   let all = [], from = 0;
   while (true) {
   const { data, error } = await supaDb.from(table).select('*').order(orderCol, { ascending: true }).range(from, from + pageSize - 1);
   if (error) throw error;
   all = all.concat(data || []);
   if (!data || data.length < pageSize) break;
   from += pageSize;
   }
   return all;
   }

   const members = await fetchAll('members', 'name');
   const suro_periods = await fetchAll('suro_periods', 'id');
   const suro_scores_raw = await fetchAll('suro_scores', 'id');

   const memberMap = {};
   members.forEach(m => { memberMap[m.id] = m; });
   const periodMap = {};
   suro_periods.forEach(p => { periodMap[p.id] = p; });

   const suro_scores = suro_scores_raw.map(s => {
   const member = memberMap[s.member_id];
   const period = periodMap[s.period_id];
   return {
   ...s,
   member_name: member ? member.name : '',
   guild: member ? (member.guild || '') : '',
   period_label: period ? (period.period_label || '') : ''
   };
   });

   const backup = {
   _meta: {
   exported_at: new Date().toISOString(),
   source: SUPABASE_URL,
   version: APP_VERSION
   },
   members: members,
   suro_periods: suro_periods,
   suro_scores: suro_scores,
   bail_history: await fetchAll('bail_history', 'id'),

   events: await fetchAll('events', 'id'),

   member_records: await fetchAll('member_records', 'id')
   };

   if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-file-export mr-2"></i>전체 백업'; }
   return backup;
  };

  window._toCSV = (data, columns) => {
   if (!data || data.length === 0) return '';
   const cols = columns || Object.keys(data[0]);
   const escape = (v) => {
   if (v === null || v === undefined) return '';
   const s = String(v);
   if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
   return '"' + s.replace(/"/g, '""') + '"';
   }
   return s;
   };
   const header = cols.map(escape).join(',');
   const rows = data.map(row => cols.map(c => escape(row[c])).join(','));
   return '\uFEFF' + header + '\n' + rows.join('\n');
  };

   if (!name) return;
   if (existingNames.has(name)) { errors.push(`${i+1}행: "${name}" 이미 존재하는 닉네임`); return; }
   if (newNames.has(name)) { errors.push(`${i+1}행: "${name}" 중복 입력`); return; }
   newNames.add(name);

   members.push({
   name: name,
   guild: tr.querySelector('.bulk-guild')?.value || '뚠카롱',
   role: tr.querySelector('.bulk-role')?.value || '팬케이크',

   let row = '';

   row += `<tr><td colspan="5" class="p-0"><div class="flex items-center gap-2 py-1 px-3 bg-pink-50 border-y-2 border-pink-200"><span class="text-[9px] font-black text-pink-400 tracking-widest uppercase">── PAGE ${pageNum} ──</span><span class="text-[9px] text-pink-300">(${globalIdx + 1}~${Math.min(globalIdx + 17, allMembers.length)}번째)</span></div></td></tr>`;

  window.parseSuroPaste = () => {
   const raw = document.getElementById('suroPasteText').value.trim();
   if (!raw) { window.showMsg('데이터를 입력해주세요.', 'error'); return; }

   const lines = raw.split('\n').filter(l => l.trim());
   const parsed = [];
   const skipped = [];

   lines.forEach((line, i) => {
   const parts = line.split(/\t+/);
   if (parts.length < 2) {
   const spaceMatch = line.match(/^(.+?)\s+([\d,]+)\s*$/);
   if (spaceMatch) {
   parts[0] = spaceMatch[1];
   parts[1] = spaceMatch[2];
   } else {
   skipped.push({ line: i + 1, text: line, reason: '형식 오류' });
   return;
   }
   }

   let name = parts[0].replace(/\([^)]*\)/g, '').trim();
   let scoreStr = parts[1].replace(/,/g, '').trim();
   let score = parseInt(scoreStr);

   if (!name) { skipped.push({ line: i + 1, text: line, reason: '닉네임 없음' }); return; }
   if (isNaN(score)) { skipped.push({ line: i + 1, text: line, reason: '점수 오류' }); return; }

   const member = appState.members.find(m => m.name === name);
   parsed.push({ name, score, member, originalLine: line });
   });

   const matched = parsed.filter(p => p.member);
   const unmatched = parsed.filter(p => !p.member);
   const period = document.getElementById('suroPastePeriod').value;

   const preview = document.getElementById('suroPastePreview');
   preview.innerHTML = `

   <span class="px-3 py-1 bg-red-50 text-red-500 rounded-lg border border-red-100"><i class="fas fa-times mr-1"></i>미매칭 ${unmatched.length}명</span>
   ${skipped.length > 0 ? `<span class="px-3 py-1 bg-gray-50 text-gray-400 rounded-lg border border-gray-100"><i class="fas fa-forward mr-1"></i>건너뜀 ${skipped.length}건</span>` : ''}
   </div>
   ${matched.length > 0 ? `

   <th class="p-2 text-right text-gray-400">점수</th>
   </tr></thead>
   <tbody>${matched.map(p => `<tr class="border-t border-gray-100"><td class="p-2 text-gray-700">${p.name}</td><td class="p-2 text-gray-400">${p.member.guild}</td><td class="p-2 text-right text-emerald-600 font-mono">${p.score.toLocaleString()}</td></tr>`).join('')}</tbody>
   </table>
   </div>
   </div>` : ''}
   ${unmatched.length > 0 ? `
   <div class="bg-red-50 rounded-xl p-3 border border-red-100 text-[10px] text-red-500">
   <p class="font-bold mb-1"><i class="fas fa-exclamation-triangle mr-1"></i>DB에 없는 닉네임 (저장 안 됨)</p>
   <p class="text-red-400">${unmatched.map(p => p.name).join(', ')}</p>
   </div>` : ''}
   ${skipped.length > 0 ? `
   <div class="bg-gray-50 rounded-xl p-3 border border-gray-100 text-[10px] text-gray-400">
   <p class="font-bold mb-1">건너뛴 줄</p>
   ${skipped.map(s => `<p>줄 ${s.line}: ${s.reason} - <span class="font-mono">${s.text.substring(0, 40)}</span></p>`).join('')}

   <i class="fas fa-save mr-1"></i> "${period}" 주차에 ${matched.length}명 점수 저장
   </button>` : ''}
   </div>`;

   window._suroParsed = matched;

  window._nexonFetch = async (endpoint, params = {}) => {
   const apiKey = window._getNexonApiKey();
   if (!apiKey) throw new Error('Nexon API Key가 설정되지 않았습니다.');
   const qs = new URLSearchParams(params).toString();
   const url = `${NEXON_API_BASE}${endpoint}${qs ? '?' + qs : ''}`;
   const res = await fetch(url, { headers: { 'x-nxopen-api-key': apiKey } });
   if (!res.ok) {
   const err = await res.json().catch(() => ({}));
   throw new Error(err.error?.message || `API 오류 (${res.status})`);
   }
   return res.json();
  };

   try {
   const allApiMembers = {};
   const errors = [];

   for (const g of appState.guilds) {
   try {
   const oguildId = await window._getGuildId(g.name, worldName);
   const basic = await window._getGuildBasic(oguildId);
   allApiMembers[g.name] = basic.guild_member || [];

   const dbByGuild = {};

   const mainChar = row.querySelector('.sync-new-mainChar')?.value || '';
   toAdd.push({ name: m.name, guild, role, class: cls, level: lvl, is_main: isMain, main_char_name: mainChar, join_date: window.getKSTDateStr() });
   });

   const promoNames = [];
   rows.forEach(row => {
   const check = row.querySelector('.sync-new-check');
   if (!check || !check.checked) return;
   const idx = parseInt(check.dataset.idx);
   const promoCheck = row.querySelector('.sync-new-promo');
   if (promoCheck && promoCheck.checked) {
     promoNames.push(window._syncNewMembers[idx].name);
   }
   });

   if (toAdd.length === 0) { window.showMsg('추가할 멤버를 선택해주세요.', 'error'); return; }
   const btn = document.getElementById('syncAddBtn');
   btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>추가 중...';

   try {
   const { error } = await supaDb.from('members').insert(toAdd);
   if (error) throw error;

   await supaDb.from('operation_history').insert(
   toAdd.map(m => ({ date: window.getKSTDateStr(), category: '동기화-추가', name: m.name, content: `${m.guild} 길드에 추가됨 (${m.role}/${m.class || '미설정'}) — API 동기화` }))
   );

   window.showMsg(`${toAdd.length}명이 DB에 추가되었습니다!`, 'success');
   await window.fetchMembers();

   // 승강 희망자 자동 등록
   if (promoNames.length > 0) {
     const promoInserts = [];
     for (const pName of promoNames) {
       const m = appState.members.find(x => x.name === pName);
       if (m && m.guild === '뚱카롱') {
         promoInserts.push({ member_id: m.id, name: pName });
       }
     }
     if (promoInserts.length > 0) {
       try {
         await supaDb.from('promotion_applicants').insert(promoInserts);
         window.showMsg(`승강 희망 ${promoInserts.length}명 자동 등록!`, 'success');
       } catch(e) { console.error('승강 등록 실패:', e); }
     }
   }

   window._runSync();
   } catch (e) {
   window.showMsg('추가 실패: ' + e.message, 'error');
   } finally {
   btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus mr-2"></i>선택한 멤버 DB에 추가';
   }
  };

   });

   if (!confirm(`정말 ${selected.length}명을 DB에서 삭제하시겠습니까?\n\n${detailLines.join('\n')}`)) return;

  window._dbeSaveRow = async (idx) => {
   const m = window._dbEditMembers[idx];
   if (!m) return;
   const row = document.getElementById(`dbEditRow_${idx}`);
   if (!row) return;

   const newName = row.querySelector('.dbe-name')?.value?.trim();
   const newGuild = row.querySelector('.dbe-guild')?.value;
   const newRole = row.querySelector('.dbe-role')?.value;
   const newClass = row.querySelector('.dbe-class')?.value || '';
   const newIsMain = row.querySelector('.dbe-isMain')?.checked !== false;
   const newMainChar = row.querySelector('.dbe-mainChar')?.value || '';

   if (!newName) { window.showMsg('닉네임을 입력해주세요.', 'error'); return; }

   const changes = {};
   if (newName !== m.name) changes.name = newName;
   if (newGuild !== m.guild) changes.guild = newGuild;
   if (newRole !== m.role) changes.role = newRole;
   if (newClass !== (m.class || '')) changes.class = newClass;
   if (newIsMain !== (m.isMain !== false)) changes.is_main = newIsMain;
   if (newMainChar !== (m.mainCharName || '')) changes.main_char_name = newMainChar;

   if (Object.keys(changes).length === 0) { window.showMsg('변경사항이 없습니다.', 'info'); return; }

   try {
   const { error } = await supaDb.from('members').update(changes).eq('id', m.id);
   if (error) throw error;

   const changeDesc = Object.entries(changes).map(([k,v]) => `${k}: ${v}`).join(', ');
   await supaDb.from('operation_history').insert({
   date: window.getKSTDateStr(), category: '수정',
   name: newName, content: `DB 편집 (#${m.id}) ${changeDesc}`
   });

   row.classList.add('bg-green-50');
   setTimeout(() => row.classList.remove('bg-green-50'), 1500);
   window.showMsg(`"${newName}" 수정 완료!`, 'success');
   await window.fetchMembers();
   } catch (e) {
   window.showMsg('수정 실패: ' + e.message, 'error');
   }
  };

  window._checkMainCharErrors = () => {

   if(!m.isMain && !mainName) {

   return;

   if(m.isMain) {
   if(mainName && mainName === m.name) {
   errors.push({ type: 'self_ref', id: m.id, name: m.name, guild: m.guild, currentMain: mainName, msg: '본캐인데 본캐필드에 자기 이름' });
   return;
   }
   if(mainName && mainName !== m.name && nameSet.has(mainName)) {
   errors.push({ type: 'wrong_main', id: m.id, name: m.name, guild: m.guild, currentMain: mainName, msg: `본캐인데 본캐필드가 "${mainName}"` });

  window._saveMainCharFixes = async () => {
   const checkedIds = new Set();
   document.querySelectorAll('.mainchar-chk:checked').forEach(el => checkedIds.add(el.dataset.fixChk));

   const fixes = {};
   document.querySelectorAll('.mainchar-fix').forEach(el => {
   const id = el.dataset.fixId;
   if(!checkedIds.has(id)) return;
   const fixType = el.dataset.fixType;
   const val = (el.value || '').trim();

   if(fixType === 'wrong_main' || fixType === 'self_ref') {
   if(val === '__keep__') return;
   const orig = (window._mainCharErrors || []).find(e => e.id === id);
   if(val === '__to_alt__') {
   fixes[id] = { isMain: false, mainCharName: orig?.currentMain || '' };
   } else if(val === '__clear__') {
   fixes[id] = { mainCharName: '' };
   }
   } else {
   const orig = (window._mainCharErrors || []).find(e => e.id === id);
   if(orig && val !== orig.currentMain) {

  window._checkEinDemotion = () => {
   const einMembers = appState.members.filter(m => m.role === '아인슈페너');
   if(einMembers.length === 0) {
   document.getElementById('einDemotionResult').innerHTML = '<p class="text-xs text-gray-400 mt-2">아인슈페너 멤버가 없습니다.</p>';
   return;
   }

   const mainMap = {};
   einMembers.forEach(m => {
   const mainName = m.mainCharName || '';
   if(!mainName) return;
   if(!mainMap[mainName]) {
   const mainChar = appState.members.find(mc => mc.name === mainName);
   const allAlts = appState.members.filter(mc => mc.mainCharName === mainName && mc.name !== mainName);
   mainMap[mainName] = { main: mainChar, einList: [], allAltCount: allAlts.length };
   }
   mainMap[mainName].einList.push(m);
   });

   const demotions = [];
   const warnings = [];

   Object.entries(mainMap).forEach(([mainName, info]) => {
   const mainChar = info.main;
   const einList = info.einList;
   const altCount = info.allAltCount;
   const mainRole = mainChar?.role || '알수없음';

   if(['스콘','반죽(휴면)','뚠스콘'].includes(mainRole)) {
   einList.forEach(m => {
   demotions.push({ name: m.name, guild: m.guild, id: m.id, mainName, mainRole, reason: '본캐 스콘/반죽' });
   });
   return;
   }

   if(['팬케이크','롤케이크','부팬케이크','부케이크'].includes(mainRole)) {
   const allowed = Math.floor(altCount / 2);
   const einCount = einList.length;
   if(einCount > allowed) {
   warnings.push({
   mainName, mainRole, altCount, allowed, einCount, excess: einCount - allowed,
   einList: einList.map(m => ({ name: m.name, guild: m.guild, id: m.id }))
   });
   }
   return;
   }
   });

   const el = document.getElementById('einDemotionResult');
   if(demotions.length === 0 && warnings.length === 0) {
   el.innerHTML = '<div class="p-3 bg-green-50 dark:bg-green-900/20 rounded-xl text-xs font-bold text-green-600 mt-2"><i class="fas fa-check mr-1"></i>강등/초과 대상 없음</div>';
   return;

   html += `<div class="bg-red-50 dark:bg-red-900/20 rounded-xl overflow-hidden border border-red-200 dark:border-red-800 mt-2">

   Object.keys(byGuild).sort().forEach(guild => {
   html += `<div class="px-3 py-1.5 bg-red-50/50 text-[10px] font-bold text-red-500 border-b border-red-100">${guild} (${byGuild[guild].length}명)</div>`;
   byGuild[guild].forEach(d => {
   html += `<div class="flex items-center gap-3 px-3 py-2 border-b border-red-50 text-xs">
   <input type="checkbox" checked data-ein-id="${d.id}" class="ein-chk w-4 h-4 accent-red-500 cursor-pointer">
   <span class="font-bold text-red-600 w-28">${d.name}</span>
   <span class="text-gray-400">본캐: ${d.mainName} (${d.mainRole})</span>
   </div>`;
   });
   });
   html += `<div class="p-3 flex justify-between items-center">
   <span class="text-[10px] text-red-400">체크된 멤버의 아인슈페너 직위를 해제합니다.</span>
   <button onclick="window._executeEinDemotion()" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-xl text-xs font-bold transition-all shadow"><i class="fas fa-arrow-down mr-1"></i>강등 실행</button>
   </div></div>`;

   html += `<div class="bg-amber-50 dark:bg-amber-900/20 rounded-xl overflow-hidden border border-amber-200 dark:border-amber-800 mt-3">
   <div class="p-3 bg-amber-100 dark:bg-amber-900/40 text-xs font-bold text-amber-700 dark:text-amber-300"><i class="fas fa-exclamation-triangle mr-1"></i>면제 초과 \u2014 아인슈페너 수 > 허용수 (${warnings.length}건)</div>`;

  window._executeEinDemotion = async () => {
   const allDemotions = window._einDemotions || [];
   const checkedIds = new Set();
   document.querySelectorAll('.ein-chk:checked').forEach(c => checkedIds.add(c.dataset.einId));
   const targets = allDemotions.filter(d => checkedIds.has(d.id));
   if(targets.length === 0) return window.showMsg('선택된 강등 대상이 없습니다.', 'error');
   if(!confirm(targets.length + '명의 아인슈페너 직위를 해제하시겠습니까?')) return;
   window.showLoading(true);
   let done = 0;
   for(const t of targets) {
   const newRole = t.guild === '뚠카롱' ? '스콘' : '뚠스콘';
   await supaDb.from('members').update({ role: newRole }).eq('id', t.id);
   done++;
   window.setLoadProgress(20 + Math.floor(60 * done / targets.length), `${done}/${targets.length} 강등 중...`);
   }
   window.showMsg(targets.length + '명 아인슈페너 강등 완료!', 'success');
   await window.fetchMembers();
   window.renderRoleAssign(document.getElementById('contentArea'));
   window.showLoading(false);
  };

  window._startOcrStream = async () => {
   try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'never' }, audio: false });
    window._ocrStream = stream;
    const video = document.createElement('video');
    video.srcObject = stream;
    video.autoplay = true;
    video.muted = true;

    stream.getVideoTracks()[0].onended = () => { window._stopOcrStream(); };

    const statusEl = document.getElementById('ocrStatus');
    if (statusEl) statusEl.textContent = '캡처 중... 길드 컨텐츠 창을 스크롤하세요';
    const startBtn = document.getElementById('ocrStartBtn');
    if (startBtn) startBtn.style.display = 'none';
    const stopBtn = document.getElementById('ocrStopBtn');
    if (stopBtn) stopBtn.style.display = '';

    const processFrame = async () => {
     if (!window._ocrStream || window._ocrProcessing) {
      window._ocrStreamLoop = setTimeout(processFrame, 200);
      return;
     }
     if (video.readyState < 2) {
      window._ocrStreamLoop = setTimeout(processFrame, 200);
      return;
     }
     try {
      window._ocrProcessing = true;
      const bitmap = await createImageBitmap(video);
      window._ocrWorker.postMessage({ type: 'PROCESS_IMAGE', payload: bitmap, source: 'STREAM' }, [bitmap]);
     } catch(err) {
      window._ocrProcessing = false;
     }
     window._ocrStreamLoop = setTimeout(processFrame, 200);
    };
    video.onloadedmetadata = () => { video.play(); processFrame(); };
   } catch(err) {
    window.showMsg('화면 캡처 권한이 필요합니다.', 'error');
   }
  };

  window._stopOcrStream = () => {
   if (window._ocrStreamLoop) { clearTimeout(window._ocrStreamLoop); window._ocrStreamLoop = null; }
   if (window._ocrStream) { window._ocrStream.getTracks().forEach(t => t.stop()); window._ocrStream = null; }
   const statusEl = document.getElementById('ocrStatus');
   if (statusEl) statusEl.textContent = '캡처 중지됨. 결과를 확인하세요.';
   const startBtn = document.getElementById('ocrStartBtn');
   if (startBtn) startBtn.style.display = '';
   const stopBtn = document.getElementById('ocrStopBtn');
   if (stopBtn) stopBtn.style.display = 'none';
  };

   const records = window._ocrAccumulatedRecords;
   if (records.length === 0) { window.showMsg('인식된 데이터가 없습니다.', 'error'); return; }
   document.getElementById('ocrCaptureModal')?.remove();
   window._stopOcrStream();
   window.openSuroPasteModal();
   setTimeout(() => {
    const textarea = document.getElementById('suroPasteText');
    if (textarea) {
     textarea.value = records.map(r => `${r.name}\t${r.culv}`).join('\n');
     window.parseSuroPaste();
    }
   }, 100);
  };

  window.openOcrCaptureModal = () => {
   window._ocrAccumulatedRecords = [];
   window._initOcrWorker();

   document.getElementById('ocrCaptureModal')?.remove();
   const modal = document.createElement('div');
   modal.id = 'ocrCaptureModal';
   modal.className = 'fixed inset-0 z-[2000] flex items-center justify-center bg-black/30 backdrop-blur-sm fade-in font-bold p-4';
   modal.innerHTML = `
   <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden border border-gray-100 max-h-[90vh] flex flex-col">
   <div class="p-5 bg-emerald-50 border-b border-emerald-100 flex justify-between items-center shrink-0">
   <div><h3 class="text-base font-bold text-emerald-700 tracking-tight"><i class="fas fa-camera mr-2"></i>화면 캡처 OCR</h3>
   <p class="text-[10px] text-emerald-500 mt-1">메이플스토리 길드 컨텐츠 창을 화면에 띄운 상태에서 캡처하세요.</p></div>
   <button onclick="window._stopOcrStream();document.getElementById('ocrCaptureModal').remove()"><i class="fas fa-times text-gray-400 text-lg"></i></button>
   </div>
   <div class="p-5 space-y-4 overflow-y-auto flex-1">
   <div class="bg-gray-50 rounded-xl p-4 border border-gray-100 space-y-3">
   <div class="flex items-center gap-2">
    <div class="w-2 h-2 rounded-full ${window._ocrReady ? 'bg-emerald-400' : 'bg-amber-400 animate-pulse'}"></div>
    <span id="ocrStatus" class="text-xs text-gray-600">${window._ocrReady ? 'OCR 엔진 준비 완료!' : 'OCR 엔진 로딩 중... (최초 1회 약 10초)'}</span>
   </div>
   <div class="flex gap-2">
    <button id="ocrStartBtn" onclick="window._startOcrStream()" ${window._ocrReady ? '' : 'disabled'} class="flex-1 py-2.5 bg-emerald-500 text-white rounded-xl text-xs font-bold hover:bg-emerald-600 transition-all disabled:opacity-40 disabled:cursor-not-allowed shadow-lg">
    <i class="fas fa-play mr-1"></i> 화면 캡처 시작
    </button>
    <button id="ocrStopBtn" onclick="window._stopOcrStream()" style="display:none" class="flex-1 py-2.5 bg-red-500 text-white rounded-xl text-xs font-bold hover:bg-red-600 transition-all shadow-lg">
    <i class="fas fa-stop mr-1"></i> 캡처 중지
    </button>
    <button onclick="window._ocrManualCapture()" class="py-2.5 px-4 bg-gray-100 text-gray-600 rounded-xl text-xs font-bold hover:bg-gray-200 transition-all">
    <i class="fas fa-image mr-1"></i> 이미지 파일
    </button>
   </div>
   </div>
   <div class="bg-emerald-50 rounded-xl p-3 border border-emerald-100 text-[10px] text-emerald-600 space-y-1">
   <p><i class="fas fa-info-circle mr-1"></i> <strong>사용법:</strong></p>
   <p>1. "화면 캡처 시작" → 메이플스토리 화면 선택</p>
   <p>2. 길드 컨텐츠 창에서 천천히 스크롤하면 자동 인식</p>
   <p>3. 인식 완료 후 "수로 점수 적용" 클릭</p>
   </div>
   <div class="space-y-2">
   <div class="flex items-center justify-between">
    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">인식 결과</span>
    <span class="text-xs text-emerald-600"><i class="fas fa-user mr-1"></i><span id="ocrRecordCount">0</span>명</span>
   </div>
   <div class="bg-gray-50 rounded-xl border border-gray-100 overflow-hidden">
    <div class="max-h-[200px] overflow-y-auto">
    <table class="w-full text-[10px]">
    <thead class="bg-gray-100 sticky top-0"><tr>
    <th class="p-1.5 text-left text-gray-400">닉네임</th>
    <th class="p-1.5 text-right text-gray-400">지하수로 점수</th>
    </tr></thead>
    <tbody id="ocrRecordList"></tbody>
    </table>
    </div>
   </div>
   </div>
   <button onclick="window._ocrApplyToPaste()" class="w-full py-3.5 bg-pink-500 text-white rounded-xl font-bold text-xs hover:bg-pink-600 transition-all shadow-lg">
   <i class="fas fa-arrow-right mr-1"></i> 수로 점수 적용하기
   </button>
   </div>
   </div>`;
   document.body.appendChild(modal);
   modal.addEventListener('click', (e) => { if (e.target === modal) { window._stopOcrStream(); modal.remove(); } });
  };

  window._ocrManualCapture = () => {
   const input = document.createElement('input');
   input.type = 'file';
   input.accept = 'image/*';
   input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file || !window._ocrWorker || !window._ocrReady) return;
    try {
     const bitmap = await createImageBitmap(file);
     window._ocrWorker.postMessage({ type: 'PROCESS_IMAGE', payload: bitmap, source: 'MANUAL' }, [bitmap]);
    } catch(err) { window.showMsg('이미지 처리 실패: ' + err.message, 'error'); }
   };
   input.click();
  };
  // ===== OCR 끝 =====

  document.addEventListener('DOMContentLoaded', async () => {
   initSidebar();
   const ve = document.getElementById('appVersion');
   if (ve) ve.textContent = 'v' + APP_VERSION;
   document.title = '뚠카롱 길드 관리 시스템 (v' + APP_VERSION + ')';
   await window._authCheck();
   window.fetchMembers();
  });
 </script>
</body>
</html>
